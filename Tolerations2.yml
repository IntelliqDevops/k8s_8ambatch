---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd-deployment
  labels:
    app: webserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      name: httpd-pod
      labels:
        app: webserver
    spec:
      containers:
        - name: httpd
          image: httpd
      tolerations:
        - key: slave3
          effect: NoSchedule
          operator: Equal
          value: intelliqit3
...
